<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hostel Menu 3D Viewer – scan a QR code to view items in 3D" />
  <title>Hostel Menu → 3D Viewer</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:#0d0d0d; color:#f0f0f0; font-family: system-ui, sans-serif; overflow:hidden; height:100dvh; }
    #canvas-container { position: fixed; inset: 0; }
    #ui { position: fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:1.25rem; gap:.75rem; pointer-events:none; }
    #card { width:100%; max-width:460px; background:rgba(0,0,0,.72); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:14px 16px; pointer-events:auto; display:none; }
    #name { font-size:1.1rem; font-weight:700; }
    #desc { font-size:.9rem; color:#bdbdbd; margin-top:.25rem; }
    #price { margin-top:.6rem; font-size:1.2rem; font-weight:800; color:#6cf; }
    #hint { font-size:.85rem; color:#a3a3a3; text-align:center; pointer-events:none; }
    #loading { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; background:#0d0d0d; z-index:10; }
    #loading.hidden { display:none; }
    .spinner { width:46px; height:46px; border:4px solid rgba(255,255,255,.15); border-top-color:#3b82f6; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg);} }
    #error { position:fixed; top:1rem; left:50%; transform:translateX(-50%); background:#ef4444; padding:.6rem 1rem; border-radius:10px; display:none; z-index:20; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Loading…</div>
  </div>

  <div id="error"></div>
  <div id="canvas-container"></div>

  <div id="ui">
    <div id="card">
      <div id="name"></div>
      <div id="desc"></div>
      <div id="price"></div>
    </div>
    <div id="hint">Tip: drag to rotate • pinch to zoom</div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
