<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WebAR 3D Viewer – scan a QR code to view products in augmented reality" />
  <title>QR → 3D AR Viewer</title>

  <!-- Three.js r160 via CDN (ES module build) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      height: 100dvh;
    }

    #canvas-container { position: fixed; inset: 0; }

    /* Overlay UI */
    #ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 1.5rem;
      gap: 0.75rem;
      pointer-events: none;
    }

    #product-card {
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1rem;
      padding: 1rem 1.25rem;
      width: 100%;
      max-width: 420px;
      pointer-events: auto;
      display: none;
    }
    #product-card h2 { font-size: 1.1rem; margin-bottom: 0.25rem; }
    #product-card p  { font-size: 0.85rem; color: #aaa; margin-bottom: 0.5rem; }
    #product-price   { font-size: 1.2rem; font-weight: 700; color: #6cf; }

    .btn {
      pointer-events: auto;
      padding: 0.65rem 1.5rem;
      border: none;
      border-radius: 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover  { opacity: 0.85; }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-ar      { background: #22c55e; color: #fff; }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #0d0d0d;
      z-index: 10;
    }
    #loading.hidden { display: none; }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      position: fixed;
      top: 1rem; left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      display: none;
      z-index: 20;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">Loading 3D viewer…</p>
  </div>

  <div id="error-msg"></div>

  <div id="canvas-container"></div>

  <div id="ui">
    <div id="product-card">
      <h2 id="product-name">Product Name</h2>
      <p  id="product-desc">Description</p>
      <span id="product-price"></span>
    </div>
    <button id="btn-load" class="btn btn-primary">Load Demo Model</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
